name: CI (frontend)

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      # Линт пока не блокирует (есть пред-существующие замечания) — только сигнализирует.
      # Блокирует именно сборка. Почистим линт отдельной задачей → потом убрать continue-on-error.
      - run: npm run lint
        continue-on-error: true
      - run: npm run build
