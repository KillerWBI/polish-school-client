<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Diklaro — рабочее место преподавателя и кабинет ученика. Группы, уроки, задания, посещаемость и финансы в одном месте, по любому предмету. Плюс самостоятельное обучение с AI. Бесплатно на старте." />
    <link rel="canonical" href="https://diklario.com/" />
    <title>Diklaro — платформа для преподавателей и учеников</title>

    <!-- PWA: установка на телефон + оффлайн-оболочка -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Diklaro" />

    <!-- Open Graph / Twitter Card (поисковики, мессенджеры, соцсети) -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Diklaro" />
    <meta property="og:locale"      content="ru_RU" />
    <meta property="og:url"         content="https://diklario.com/" />
    <meta property="og:title"       content="Diklaro — платформа для преподавателей и учеников" />
    <meta property="og:description" content="Рабочее место преподавателя и кабинет ученика: группы, уроки, задания, посещаемость и финансы в одном месте, по любому предмету. Плюс самообучение с AI. Бесплатно на старте." />
    <meta property="og:image"       content="https://diklario.com/og.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card"       content="summary_large_image" />
    <meta name="twitter:title"      content="Diklaro — платформа для преподавателей и учеников" />
    <meta name="twitter:description" content="Рабочее место преподавателя и кабинет ученика: группы, уроки, задания, посещаемость и финансы в одном месте, по любому предмету." />
    <meta name="twitter:image"      content="https://diklario.com/og.png" />

    <!-- Шрифты редизайна: Space Grotesk (заголовки) + JetBrains Mono (моно) + Inter (текст) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

    <!-- Structured data: бренд и сайт для поисковиков -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "Diklaro",
          "url": "https://diklario.com/",
          "logo": "https://diklario.com/icon.svg",
          "description": "Платформа для преподавателей и учеников по любому предмету: группы, уроки, задания, посещаемость, финансы и самообучение с AI."
        },
        {
          "@type": "WebSite",
          "name": "Diklaro",
          "url": "https://diklario.com/",
          "inLanguage": ["ru", "en", "pl", "uk"]
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
