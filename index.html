<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="LinguaFlow — рабочее место преподавателя и кабинет ученика. Группы, уроки, задания, посещаемость и финансы в одном месте, по любому предмету." />
    <title>LinguaFlow — платформа для преподавателей и учеников</title>

    <!-- PWA: установка на телефон + оффлайн-оболочка -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LinguaFlow" />

    <!-- Open Graph / Twitter Card (поисковики, мессенджеры, соцсети) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://linguaflow.app" />
    <meta property="og:title"       content="LinguaFlow — платформа для преподавателей и учеников" />
    <meta property="og:description" content="Рабочее место преподавателя и кабинет ученика: группы, уроки, задания, посещаемость и финансы в одном месте, по любому предмету. Бесплатно на старте." />
    <meta property="og:image"       content="https://linguaflow.app/og.png" />
    <meta name="twitter:card"       content="summary_large_image" />
    <meta name="twitter:title"      content="LinguaFlow — платформа для преподавателей и учеников" />
    <meta name="twitter:description" content="Рабочее место преподавателя и кабинет ученика: группы, уроки, задания, посещаемость и финансы в одном месте, по любому предмету." />
    <meta name="twitter:image"      content="https://linguaflow.app/og.png" />

    <!-- Шрифты редизайна: Space Grotesk (заголовки) + JetBrains Mono (моно) + Inter (текст) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
